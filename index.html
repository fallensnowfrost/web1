<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>企业员工与考勤管理系统</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand">
          <span class="brand-mark">HR</span>
          <div>
            <strong>明川人事</strong>
            <small>员工与考勤管理</small>
          </div>
        </div>
        <nav class="nav-list">
          <button class="nav-item active" data-view="dashboard" aria-label="总览">
            <span class="icon">⌂</span><span>总览</span>
          </button>
          <button class="nav-item" data-view="employees" aria-label="员工">
            <span class="icon">◎</span><span>员工</span>
          </button>
          <button class="nav-item" data-view="attendance" aria-label="考勤">
            <span class="icon">◷</span><span>考勤</span>
          </button>
          <button class="nav-item" data-view="approvals" aria-label="审批">
            <span class="icon">✓</span><span>审批</span>
          </button>
        </nav>
        <div class="sidebar-card">
          <span>本月出勤率</span>
          <strong>96.8%</strong>
          <div class="meter"><span style="width: 96.8%"></span></div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">2026 年 5 月</p>
            <h1>企业员工与考勤管理系统</h1>
          </div>
          <div class="actions">
            <label class="search">
              <span>⌕</span>
              <input id="searchInput" type="search" placeholder="搜索员工、部门或工号" />
            </label>
            <button class="icon-button" id="toggleTheme" aria-label="切换主题">◐</button>
            <button class="primary-button" id="openEmployeeModal"><span>＋</span>新增员工</button>
          </div>
        </header>

        <section class="view active" id="dashboard">
          <div class="stats-grid">
            <article class="stat-card accent-blue">
              <span>在职员工</span>
              <strong>248</strong>
              <small>较上月 +12</small>
            </article>
            <article class="stat-card accent-green">
              <span>今日正常出勤</span>
              <strong>231</strong>
              <small>8 人外勤，5 人请假</small>
            </article>
            <article class="stat-card accent-orange">
              <span>异常待处理</span>
              <strong>14</strong>
              <small>迟到、漏打卡、早退</small>
            </article>
            <article class="stat-card accent-purple">
              <span>平均工时</span>
              <strong>8.2h</strong>
              <small>本周均值</small>
            </article>
          </div>

          <div class="main-grid">
            <section class="panel">
              <div class="panel-head">
                <div>
                  <h2>部门出勤概览</h2>
                  <p>按部门汇总实时考勤状态</p>
                </div>
                <select id="deptFilter" aria-label="部门筛选">
                  <option value="all">全部部门</option>
                  <option value="产品部">产品部</option>
                  <option value="研发部">研发部</option>
                  <option value="销售部">销售部</option>
                  <option value="人事部">人事部</option>
                </select>
              </div>
              <div class="department-list" id="departmentList"></div>
            </section>

            <section class="panel">
              <div class="panel-head compact">
                <h2>今日打卡</h2>
                <button class="ghost-button" id="clockInButton">快速打卡</button>
              </div>
              <div class="clock-card">
                <div class="clock-time" id="clockTime">09:18:42</div>
                <div class="clock-status" id="clockStatus">未打上班卡</div>
              </div>
              <div class="timeline" id="timeline"></div>
            </section>
          </div>
        </section>

        <section class="view" id="employees">
          <section class="panel full">
            <div class="panel-head">
              <div>
                <h2>员工档案</h2>
                <p>统一维护员工、部门、岗位、入职状态</p>
              </div>
              <div class="segmented" role="tablist" aria-label="员工状态筛选">
                <button class="active" data-status="all">全部</button>
                <button data-status="在职">在职</button>
                <button data-status="试用">试用</button>
                <button data-status="离职">离职</button>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>员工</th>
                    <th>工号</th>
                    <th>部门</th>
                    <th>岗位</th>
                    <th>状态</th>
                    <th>本月出勤</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="employeeTable"></tbody>
              </table>
            </div>
          </section>
        </section>

        <section class="view" id="attendance">
          <div class="main-grid attendance-grid">
            <section class="panel">
              <div class="panel-head">
                <div>
                  <h2>考勤记录</h2>
                  <p>按天查看打卡、请假与异常</p>
                </div>
                <input type="date" id="attendanceDate" value="2026-05-29" />
              </div>
              <div class="record-list" id="recordList"></div>
            </section>
            <section class="panel">
              <div class="panel-head compact">
                <h2>班次规则</h2>
                <button class="ghost-button" id="addRuleButton">新增规则</button>
              </div>
              <div class="rule-list" id="ruleList"></div>
            </section>
          </div>
        </section>

        <section class="view" id="approvals">
          <section class="panel full">
            <div class="panel-head">
              <div>
                <h2>异常与假勤审批</h2>
                <p>处理漏打卡、请假、外勤与加班申请</p>
              </div>
              <button class="primary-button" id="approveAll">批量通过</button>
            </div>
            <div class="approval-board" id="approvalBoard"></div>
          </section>
        </section>
      </main>
    </div>

    <dialog id="employeeModal">
      <form method="dialog" class="modal-card">
        <div class="modal-head">
          <h2>新增员工</h2>
          <button class="icon-button" value="cancel" aria-label="关闭">×</button>
        </div>
        <label>
          姓名
          <input id="newName" required placeholder="例如：陈雨晴" />
        </label>
        <label>
          部门
          <select id="newDept">
            <option>研发部</option>
            <option>产品部</option>
            <option>销售部</option>
            <option>人事部</option>
            <option>财务部</option>
          </select>
        </label>
        <label>
          岗位
          <input id="newRole" required placeholder="例如：前端工程师" />
        </label>
        <div class="modal-actions">
          <button class="ghost-button" value="cancel">取消</button>
          <button class="primary-button" id="saveEmployee" value="default">保存</button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
